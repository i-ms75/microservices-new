eureka.client.serviceUrl.DefaultZone=http://localhost:8761/eureka
spring.application.name=api-gateway

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE

## Product Service Route
spring.cloud.gateway.server.webmvc.routes[0].id=product-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product

## Inventory-service routes
spring.cloud.gateway.server.webmvc.routes[1].id=inventory-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://inventory-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/inventory

## Order-service routes
spring.cloud.gateway.server.webmvc.routes[2].id=order-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/order

## Discovery-server routes
spring.cloud.gateway.server.webmvc.routes[3].id=discovery-server
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8761
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/eureka/web
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=SetPath=/

## Discovery-server routes-static
spring.cloud.gateway.server.webmvc.routes[4].id=discovery-server-static
spring.cloud.gateway.server.webmvc.routes[4].uri=http://localhost:8761
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/eureka/**

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/springboot-microservices-realm

management.zipkin.tracing.endpoint==http://localhost:9411
management.tracing.sampling.probability=1.0
